
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Upgrade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5" style="max-width: 600px;">
    <div class="card shadow-sm border-0 p-4">
        <h2 class="text-center mb-4 text-primary fw-bold">Student Registration</h2>
        
        <form action="process.php" method="POST" enctype="multipart/form-data">
            
            <div class="mb-3">
                <label for="name" class="form-label fw-semibold">Full Name</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>

            <div class="mb-3">
                <label for="photo" class="form-label fw-semibold">Profile Photo</label>
                <input class="form-control" type="file" id="photo" name="photo" accept="image/*">
                <div class="form-text text-muted">Front-end UI & placeholder logic only (No backend save needed yet).</div>
            </div>

            <div class="mb-3">
                <label class="form-label d-block fw-semibold">Gender</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="genderMale" value="Male">
                    <label class="form-check-input-label" for="genderMale">Male</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="genderFemale" value="Female">
                    <label class="form-check-input-label" for="genderFemale">Female</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="genderOther" value="Other">
                    <label class="form-check-input-label" for="genderOther">Other</label>
                </div>
            </div>

            <div class="mb-3">
                <label for="course" class="form-label fw-semibold">Course Selection</label>
                <select class="form-select" id="course" name="course">
                    <option value="" selected disabled>Choose a course...</option>
                    <option value="Web Development">Web Development</option>
                    <option value="Data Science">Data Science</option>
                    <option value="Cyber Security">Cyber Security</option>
                </select>
            </div>

            <div class="mb-4">
                <label for="address" class="form-label fw-semibold">Address</label>
                <textarea class="form-control" id="address" name="address" rows="3"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Register Student</button>
        </form>
    </div>
</div>

</body>
</html>
