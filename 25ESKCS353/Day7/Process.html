<?php
// Initialize errors array
$errors = [];

// 1. Better Validation Execution
if ($_SERVER["REQUEST_METHOD"] === "POST") {
    
    // Sanitize and capture fields safely
    $name = isset($_POST['name']) ? trim($_POST['name']) : '';
    $gender = isset($_POST['gender']) ? $_POST['gender'] : '';
    $course = isset($_POST['course']) ? $_POST['course'] : '';
    $address = isset($_POST['address']) ? trim($_POST['address']) : '';

    // Rule A: Name cannot contain numbers
    if (empty($name)) {
        $errors[] = "Full Name is required.";
    } elseif (preg_match('~[0-9]~', $name)) {
        $errors[] = "Full Name cannot contain numbers.";
    }

    // Rule B: Gender selection is required
    if (empty($gender)) {
        $errors[] = "Please select a gender option.";
    }

    // Rule C: Course dropdown selection required
    if (empty($course)) {
        $errors[] = "Please choose a valid course option.";
    }

    // Rule D: Address minimum length constraints
    if (empty($address)) {
        $errors[] = "Address field is required.";
    } elseif (strlen($address) < 10) {
        $errors[] = "Address must be at least 10 characters long.";
    }
}
?>
